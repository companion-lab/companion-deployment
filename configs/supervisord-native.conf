[supervisord]
nodaemon=true
logfile=/var/log/companion/supervisord.log
pidfile=/var/run/supervisord.pid

[program:redis]
command=/usr/bin/redis-server /opt/companion/config/redis.conf
autostart=true
autorestart=true
stdout_logfile=/var/log/companion/redis.log
stderr_logfile=/var/log/companion/redis.err.log

[program:qdrant]
command=/usr/local/bin/qdrant --config-path /opt/companion/config/qdrant.yaml
autostart=true
autorestart=true
stdout_logfile=/var/log/companion/qdrant.log
stderr_logfile=/var/log/companion/qdrant.err.log
startsecs=2

[program:minio]
command=/usr/local/bin/minio server /var/lib/minio/data --console-address ":9001"
environment=MINIO_ROOT_USER="vexa-access-key",MINIO_ROOT_PASSWORD="vexa-secret-key"
autostart=true
autorestart=true
stdout_logfile=/var/log/companion/minio.log
stderr_logfile=/var/log/companion/minio.err.log
startsecs=2

[program:hivemind]
command=/usr/local/bin/hivemind
environment=DB_HOST="127.0.0.1",DB_PORT="5432",DB_NAME="postgres",DB_USER="supabase_admin",DB_PASSWORD="postgres",DB_SCHEMA="hivemind",JWT_SECRET="%(ENV_HIVEMIND_JWT_SECRET)s",JWT_TTL_SECONDS="2592000",ENCRYPTION_SECRET="%(ENV_HIVEMIND_ENCRYPTION_SECRET)s",VEXA_API_URL="http://127.0.0.1:8056",VEXA_ADMIN_API_URL="http://127.0.0.1:8057",VEXA_ADMIN_TOKEN="token",EMBEDDING_API_URL="http://127.0.0.1:11434",EMBEDDING_MODEL="nomic-embed-text",QDRANT_URL="http://127.0.0.1:6334",QDRANT_API_KEY="qdrant-dev-key",HOST="0.0.0.0",PORT="9100"
autostart=true
autorestart=true
stdout_logfile=/var/log/companion/hivemind.log
stderr_logfile=/var/log/companion/hivemind.err.log
startsecs=3

[program:vexa-api-gateway]
command=/opt/companion/venv/bin/uvicorn main:app --host 0.0.0.0 --port 8056
directory=/root/PPI/companion-voice/services/api-gateway
environment=ADMIN_API_URL="http://127.0.0.1:8057",BOT_MANAGER_URL="http://127.0.0.1:8080",TRANSCRIPTION_COLLECTOR_URL="http://127.0.0.1:8124",MCP_URL="http://127.0.0.1:18888",REDIS_URL="redis://127.0.0.1:6379/0",PUBLIC_BASE_URL="http://127.0.0.1:8056",DB_HOST="127.0.0.1",DB_PORT="5432",DB_NAME="postgres",DB_USER="supabase_admin",DB_PASSWORD="postgres",DB_SCHEMA="vexa",DB_SSL_MODE="disable"
autostart=true
autorestart=true
stdout_logfile=/var/log/vexa/api-gateway.log
stderr_logfile=/var/log/vexa/api-gateway.err.log
startsecs=5

[program:vexa-admin-api]
command=/opt/companion/venv/bin/uvicorn app.main:app --host 0.0.0.0 --port 8057
directory=/root/PPI/companion-voice/services/admin-api
environment=DB_HOST="127.0.0.1",DB_PORT="5432",DB_NAME="postgres",DB_USER="supabase_admin",DB_PASSWORD="postgres",DB_SCHEMA="vexa",DB_SSL_MODE="disable",ADMIN_API_TOKEN="token"
autostart=true
autorestart=true
stdout_logfile=/var/log/vexa/admin-api.log
stderr_logfile=/var/log/vexa/admin-api.err.log
startsecs=3

[program:vexa-bot-manager]
command=/opt/companion/venv/bin/uvicorn app.main:app --host 0.0.0.0 --port 8080
directory=/root/PPI/companion-voice/services/bot-manager
environment=REDIS_URL="redis://127.0.0.1:6379/0",TTS_SERVICE_URL="http://127.0.0.1:8002",DB_HOST="127.0.0.1",DB_PORT="5432",DB_NAME="postgres",DB_USER="supabase_admin",DB_PASSWORD="postgres",DB_SCHEMA="vexa",DB_SSL_MODE="disable",ADMIN_TOKEN="token",DEVICE_TYPE="remote",WHISPER_LIVE_URL="ws://127.0.0.1:9090/ws",STORAGE_BACKEND="minio",MINIO_ENDPOINT="127.0.0.1:9000",MINIO_ACCESS_KEY="vexa-access-key",MINIO_SECRET_KEY="vexa-secret-key",MINIO_BUCKET="vexa-recordings",DOCKER_HOST="unix:///var/run/docker.sock",DOCKER_NETWORK="host",BOT_CALLBACK_URL="http://127.0.0.1:8080/bots/internal/callback/exited",BOT_RECORDING_UPLOAD_URL="http://127.0.0.1:8080/internal/recordings/upload"
autostart=true
autorestart=true
stdout_logfile=/var/log/vexa/bot-manager.log
stderr_logfile=/var/log/vexa/bot-manager.err.log
startsecs=5

[program:vexa-transcription-collector]
command=/opt/companion/venv/bin/uvicorn main:app --host 0.0.0.0 --port 8124
directory=/root/PPI/companion-voice/services/transcription-collector
environment=DB_HOST="127.0.0.1",DB_PORT="5432",DB_NAME="postgres",DB_USER="supabase_admin",DB_PASSWORD="postgres",DB_SCHEMA="vexa",DB_SSL_MODE="disable",REDIS_HOST="127.0.0.1",REDIS_PORT="6379",ADMIN_TOKEN="token",STORAGE_BACKEND="minio",MINIO_ENDPOINT="127.0.0.1:9000",MINIO_ACCESS_KEY="vexa-access-key",MINIO_SECRET_KEY="vexa-secret-key",MINIO_BUCKET="vexa-recordings"
autostart=true
autorestart=true
stdout_logfile=/var/log/vexa/transcription-collector.log
stderr_logfile=/var/log/vexa/transcription-collector.err.log
startsecs=5

[program:vexa-mcp]
command=/opt/companion/venv/bin/uvicorn main:app --host 0.0.0.0 --port 18888
directory=/root/PPI/companion-voice/services/mcp
environment=API_GATEWAY_URL="http://127.0.0.1:8056"
autostart=true
autorestart=true
stdout_logfile=/var/log/vexa/mcp.log
stderr_logfile=/var/log/vexa/mcp.err.log
startsecs=3

[program:vexa-tts-service]
command=/opt/companion/venv/bin/uvicorn main:app --host 0.0.0.0 --port 8002
directory=/root/PPI/companion-voice/services/tts-service
environment=OPENAI_API_KEY="",OPENAI_BASE_URL="https://api.openai.com"
autostart=true
autorestart=true
stdout_logfile=/var/log/vexa/tts-service.log
stderr_logfile=/var/log/vexa/tts-service.err.log
startsecs=3
